<!doctype html>
<html data-theme="ink">
<head>
<meta charset="utf-8">
<title>Punk · a bounded work kernel for agents</title>
<style>
/* ==========================================================================
   SpecPunk — Colors & Type
   Local-first, stewarded multi-agent engineering runtime
   ==========================================================================
   Import once at the document root:
     <link rel="stylesheet" href="/colors_and_type.css">
   ========================================================================== */

/* ---- Fonts ---------------------------------------------------------------
   Three families, no more.
     — JetBrains Mono: code, specs, agent transcripts, UI chrome
     — Space Grotesk:  display, wordmark, marketing headlines
     — IBM Plex Serif: long-form specs, essays, editorial
   -------------------------------------------------------------------------- */
@font-face { font-family: 'JetBrains Mono'; font-style: normal; font-weight: 400; font-display: swap;
  src: url('fonts/JetBrainsMono-400.woff2') format('woff2'); }
@font-face { font-family: 'JetBrains Mono'; font-style: normal; font-weight: 500; font-display: swap;
  src: url('fonts/JetBrainsMono-500.woff2') format('woff2'); }
@font-face { font-family: 'JetBrains Mono'; font-style: normal; font-weight: 700; font-display: swap;
  src: url('fonts/JetBrainsMono-700.woff2') format('woff2'); }

@font-face { font-family: 'Space Grotesk'; font-style: normal; font-weight: 400; font-display: swap;
  src: url('fonts/SpaceGrotesk-400.woff2') format('woff2'); }
@font-face { font-family: 'Space Grotesk'; font-style: normal; font-weight: 500; font-display: swap;
  src: url('fonts/SpaceGrotesk-500.woff2') format('woff2'); }
@font-face { font-family: 'Space Grotesk'; font-style: normal; font-weight: 700; font-display: swap;
  src: url('fonts/SpaceGrotesk-700.woff2') format('woff2'); }

@font-face { font-family: 'IBM Plex Serif'; font-style: normal; font-weight: 400; font-display: swap;
  src: url('fonts/IBMPlexSerif-400.woff2') format('woff2'); }
@font-face { font-family: 'IBM Plex Serif'; font-style: normal; font-weight: 600; font-display: swap;
  src: url('fonts/IBMPlexSerif-600.woff2') format('woff2'); }
@font-face { font-family: 'IBM Plex Serif'; font-style: italic; font-weight: 400; font-display: swap;
  src: url('fonts/IBMPlexSerif-400Italic.woff2') format('woff2'); }

/* ==========================================================================
   TOKENS — root (paper mode, default)
   ========================================================================== */
:root {
  /* ---- Font families -------------------------------------------------- */
  --font-mono:    'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  --font-display: 'Space Grotesk', ui-sans-serif, system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif;
  --font-serif:   'IBM Plex Serif', 'Iowan Old Style', Georgia, Cambria, 'Times New Roman', serif;

  /* ---- Raw palette ---------------------------------------------------- */
  /* Paper & ink — the "spec" half */
  --ink-000:  #ffffff;
  --ink-050:  #f7f5f0;   /* paper  — base background */
  --ink-100:  #efece4;   /* paper warm shade         */
  --ink-150:  #e4e0d4;   /* rule   — hairlines       */
  --ink-200:  #cfcabb;   /* muted border             */
  --ink-400:  #7a7668;   /* tertiary text            */
  --ink-600:  #3a382f;   /* secondary text           */
  --ink-900:  #0f0e0b;   /* ink — primary text       */
  --ink-950:  #05040a;   /* pure ink / deep bg       */

  /* Punk accents — the "punk" half. Use with discipline: one per screen. */
  --punk-magenta:   #ff2e88;   /* PRIMARY accent. Hot pink, stencil energy.  */
  --punk-magenta-ink: #c7005f; /* high-contrast on paper                     */
  --punk-magenta-bg:  #ffe1ee; /* wash                                        */

  --agent-green:    #12c06a;   /* agent active / success                      */
  --agent-green-ink:#0a7d45;
  --agent-green-bg: #d8f5e6;

  --steward-amber:  #f7a93b;   /* stewardship / attention / awaiting human    */
  --steward-amber-ink: #8a5a0c;
  --steward-amber-bg:  #fdecce;

  --error-red:      #e8433a;
  --error-red-ink:  #a51b14;
  --error-red-bg:   #fadbd9;

  --spec-blue:      #2b6dfb;   /* info / spec links                           */
  --spec-blue-ink:  #1043b8;
  --spec-blue-bg:   #d9e3fc;

  /* ---- Semantic surfaces & text -------------------------------------- */
  --bg:         var(--ink-050);
  --bg-raised: var(--ink-000);
  --bg-sunken: var(--ink-100);
  --bg-code:   var(--ink-100);

  --fg:        var(--ink-900);
  --fg-1:      var(--ink-900);  /* primary                                  */
  --fg-2:      var(--ink-600);  /* secondary                                */
  --fg-3:      var(--ink-400);  /* tertiary / meta / timestamps             */
  --fg-on-accent: var(--ink-000);

  --border:        var(--ink-150);
  --border-strong: var(--ink-200);
  --border-ink:    var(--ink-900);   /* intentional hard rule               */

  --accent:        var(--punk-magenta);
  --accent-ink:    var(--punk-magenta-ink);
  --accent-bg:     var(--punk-magenta-bg);

  --ok:   var(--agent-green);
  --warn: var(--steward-amber);
  --err:  var(--error-red);
  --info: var(--spec-blue);

  /* ---- Spacing (4px base) -------------------------------------------- */
  --s-0:   0;
  --s-1:   2px;
  --s-2:   4px;
  --s-3:   8px;
  --s-4:   12px;
  --s-5:   16px;
  --s-6:   20px;
  --s-7:   24px;
  --s-8:   32px;
  --s-9:   40px;
  --s-10:  56px;
  --s-11:  72px;
  --s-12:  96px;

  /* ---- Radii — small, deliberate.  SpecPunk is mostly square. -------- */
  --r-0:   0;
  --r-1:   2px;
  --r-2:   4px;
  --r-3:   6px;
  --r-pill: 999px;

  /* ---- Borders -------------------------------------------------------- */
  --bw-1: 1px;
  --bw-2: 2px;
  --bw-3: 3px;

  /* ---- Shadows — flat by default. Offset shadows only as a motif. ---- */
  --shadow-0: none;
  --shadow-1: 0 1px 0 var(--ink-150);
  --shadow-card: 3px 3px 0 0 var(--ink-900);     /* offset "sticker" shadow */
  --shadow-card-lg: 6px 6px 0 0 var(--ink-900);
  --shadow-pop: 0 4px 16px -4px rgba(15,14,11,0.18);

  /* ---- Motion --------------------------------------------------------- */
  --dur-1: 80ms;
  --dur-2: 160ms;
  --dur-3: 240ms;
  --ease:  cubic-bezier(0.2, 0.7, 0.2, 1);
  --ease-snap: cubic-bezier(0.3, 1.4, 0.5, 1);   /* small overshoot; punk   */

  /* ---- Type scale (rem, 16px base) ----------------------------------- */
  --fs-xs:    12px;
  --fs-sm:    13px;
  --fs-base:  15px;
  --fs-md:    17px;
  --fs-lg:    20px;
  --fs-xl:    24px;
  --fs-2xl:   32px;
  --fs-3xl:   44px;
  --fs-4xl:   60px;
  --fs-5xl:   84px;

  --lh-tight: 1.05;
  --lh-snug:  1.2;
  --lh-base:  1.45;
  --lh-long:  1.65;

  --tracking-tight:  -0.02em;
  --tracking-snug:   -0.01em;
  --tracking-base:   0;
  --tracking-wide:    0.04em;
  --tracking-caps:    0.12em;   /* ALL-CAPS LABELS                        */
}

/* ==========================================================================
   DARK / TERMINAL MODE
   Apply via <html data-theme="ink"> or the prefers-color-scheme media query.
   ========================================================================== */
[data-theme="ink"], .specpunk-ink {
  --bg:        var(--ink-950);
  --bg-raised: #11101a;
  --bg-sunken: #000006;
  --bg-code:   #0a0912;

  --fg:    #ebe7da;
  --fg-1:  #ebe7da;
  --fg-2:  #a6a396;
  --fg-3:  #6c6a5e;

  --border:        #22202b;
  --border-strong: #34323f;
  --border-ink:    #ebe7da;

  --accent:     #ff48a1;            /* magenta pops brighter on ink       */
  --accent-ink: #ffb7d5;
  --accent-bg:  #2a0f1c;

  --ok:   #3fe38d;
  --warn: #ffc06b;
  --err:  #ff6b62;
  --info: #77a9ff;

  --shadow-card:    3px 3px 0 0 #ff2e88;  /* accent offset on dark        */
  --shadow-card-lg: 6px 6px 0 0 #ff2e88;
  --shadow-pop:     0 8px 24px -4px rgba(0,0,0,0.6);
}

/* Respect system pref unless explicitly overridden */
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="paper"]) {
    --bg:        var(--ink-950);
    --bg-raised: #11101a;
    --bg-sunken: #000006;
    --bg-code:   #0a0912;
    --fg: #ebe7da; --fg-1: #ebe7da; --fg-2: #a6a396; --fg-3: #6c6a5e;
    --border: #22202b; --border-strong: #34323f; --border-ink: #ebe7da;
    --accent: #ff48a1; --accent-ink: #ffb7d5; --accent-bg: #2a0f1c;
    --ok: #3fe38d; --warn: #ffc06b; --err: #ff6b62; --info: #77a9ff;
    --shadow-card: 3px 3px 0 0 #ff2e88; --shadow-card-lg: 6px 6px 0 0 #ff2e88;
    --shadow-pop: 0 8px 24px -4px rgba(0,0,0,0.6);
  }
}

/* ==========================================================================
   BASE ELEMENT STYLES
   These apply globally — opt out by scoping inside .specpunk-reset-off.
   ========================================================================== */
html, body {
  background: var(--bg);
  color: var(--fg-1);
  font-family: var(--font-mono);
  font-size: var(--fs-base);
  line-height: var(--lh-base);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* Display headings use Space Grotesk with tight tracking.
   Marketing + hero moments. Lean on weight, not size. */
h1, .h1 {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: var(--fs-4xl);
  line-height: var(--lh-tight);
  letter-spacing: var(--tracking-tight);
  margin: 0 0 var(--s-6);
}
h2, .h2 {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: var(--fs-2xl);
  line-height: var(--lh-snug);
  letter-spacing: var(--tracking-snug);
  margin: 0 0 var(--s-5);
}
h3, .h3 {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: var(--fs-xl);
  line-height: var(--lh-snug);
  letter-spacing: var(--tracking-snug);
  margin: 0 0 var(--s-4);
}
h4, .h4 {
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: var(--fs-md);
  line-height: var(--lh-snug);
  letter-spacing: var(--tracking-base);
  margin: 0 0 var(--s-3);
}

/* Body copy is mono by default — SpecPunk is a developer brand.
   Use .prose for long-form reading (swaps to Plex Serif). */
p, .p {
  font-family: var(--font-mono);
  font-size: var(--fs-base);
  line-height: var(--lh-base);
  margin: 0 0 var(--s-4);
  max-width: 70ch;
}

.prose {
  font-family: var(--font-serif);
  font-size: var(--fs-md);
  line-height: var(--lh-long);
}
.prose p { font-family: var(--font-serif); font-size: var(--fs-md); max-width: 62ch; }
.prose em { font-style: italic; }
.prose strong { font-weight: 600; }

/* All-caps labels. Common across the system — section headers,
   status pills, technical metadata. */
.eyebrow, .label-caps {
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: var(--fs-xs);
  letter-spacing: var(--tracking-caps);
  text-transform: uppercase;
  color: var(--fg-2);
}

/* Code + pre — native medium. Paper mode shows a subtle inset wash. */
code, .code {
  font-family: var(--font-mono);
  font-size: 0.92em;
  background: var(--bg-code);
  padding: 1px 6px;
  border-radius: var(--r-2);
  border: 1px solid var(--border);
}
pre, .pre {
  font-family: var(--font-mono);
  font-size: var(--fs-sm);
  line-height: 1.55;
  background: var(--bg-code);
  color: var(--fg-1);
  padding: var(--s-5) var(--s-6);
  border: 1px solid var(--border);
  border-radius: var(--r-2);
  overflow-x: auto;
}
pre code { background: transparent; border: 0; padding: 0; font-size: 1em; }

/* Links — underline offset is intentional; we like the rule showing. */
a, .link {
  color: var(--accent-ink);
  text-decoration: underline;
  text-decoration-thickness: 1px;
  text-underline-offset: 3px;
  transition: color var(--dur-2) var(--ease);
}
a:hover { color: var(--accent); }
a:active { color: var(--fg-1); }

/* CTA buttons are NOT subject to the generic link hover rule — keep their ink color */
a.btn, a.btn:hover, a.btn:focus, a.btn:active { text-decoration: none; }
a.btn-primary, a.btn-primary:link, a.btn-primary:visited,
a.btn-primary:hover, a.btn-primary:focus, a.btn-primary:active {
  color: #0f0e0b !important;
}
a.nav-cta, a.nav-cta:link, a.nav-cta:visited,
a.nav-cta:hover, a.nav-cta:focus, a.nav-cta:active {
  color: #0f0e0b !important;
}

/* Horizontal rules are a brand motif — used as section dividers. */
hr {
  border: 0;
  border-top: 1px solid var(--border-ink);
  margin: var(--s-8) 0;
}

/* Small helper: an ASCII bullet, sticker-style. */
.sticker {
  display: inline-block;
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: var(--fs-xs);
  letter-spacing: var(--tracking-caps);
  text-transform: uppercase;
  color: var(--fg-on-accent);
  background: var(--accent);
  padding: 3px 8px 2px;
  border-radius: var(--r-1);
  transform: rotate(-1.5deg);
  box-shadow: 2px 2px 0 0 var(--ink-900);
}

/* Selection */
::selection { background: var(--accent); color: var(--fg-on-accent); }

/* Focus ring — visible, square, accented. */
:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

</style>
<style>
  html, body { margin: 0; padding: 0; background: #05040a; }
  * { box-sizing: border-box; }
  ::selection { background: #ff2e88; color: #0f0e0b; }

  /* page-scoped tweaks */
  body { color: #ebe7da; }
  .wrap { max-width: 1280px; margin: 0 auto; padding: 0 40px; }
  .rule-ink { border-top: 1px solid #2a2835; }
  .hair { border-top: 1px solid #1a1924; }

  /* mono-link utility */
  .mono-link {
    font-family: var(--font-mono); font-size: 13px;
    color: #ebe7da; text-decoration: none;
    border-bottom: 1px dashed #3a3848;
    padding-bottom: 1px;
  }
  .mono-link:hover { color: #ff48a1; border-bottom-color: #ff48a1; }

  /* buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--font-mono); font-weight: 700; font-size: 14px;
    letter-spacing: 0.06em; text-transform: uppercase;
    padding: 14px 20px 13px;
    border: 1.5px solid #ebe7da; color: #ebe7da;
    background: transparent; text-decoration: none; cursor: pointer;
    transition: transform 120ms var(--ease), box-shadow 120ms var(--ease), background 120ms var(--ease);
  }
  .btn-primary {
    background: #ff2e88; color: #0f0e0b; border-color: #ff2e88;
    box-shadow: 4px 4px 0 0 #ebe7da;
  }
  .btn-primary:hover { transform: translate(-1px,-1px); box-shadow: 5px 5px 0 0 #ebe7da; }
  .btn-primary:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 0 #ebe7da; }
  .btn-ghost:hover { background: #11101a; }

  /* eyebrow */
  .eyebrow {
    font-family: var(--font-mono); font-weight: 700; font-size: 11px;
    letter-spacing: 0.16em; text-transform: uppercase; color: #a6a396;
  }
  .eyebrow .accent { color: #ff48a1; }

  /* status dot */
  .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }

  /* grid line ornament */
  .gridlines {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(to right, rgba(235,231,218,0.035) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(235,231,218,0.035) 1px, transparent 1px);
    background-size: 64px 64px;
    mask-image: radial-gradient(ellipse at 50% 30%, black 20%, transparent 75%);
    pointer-events: none;
  }

  /* shimmer quill */
  @keyframes blink { 0%, 94%, 100% { opacity: 1 } 97% { opacity: 0.35 } }
  .eye-blink { animation: blink 4.2s infinite; }

  @keyframes quill-pulse {
    0%, 100% { opacity: 0.85; }
    50% { opacity: 1; filter: drop-shadow(0 0 6px #ff2e88); }
  }
  .quill { animation: quill-pulse 5s ease-in-out infinite; }
  .quill:nth-child(2) { animation-delay: 0.3s }
  .quill:nth-child(3) { animation-delay: 0.6s }
  .quill:nth-child(4) { animation-delay: 0.9s }
  .quill:nth-child(5) { animation-delay: 1.2s }
  .quill:nth-child(6) { animation-delay: 1.5s }
  .quill:nth-child(7) { animation-delay: 1.8s }

  @keyframes cursor-blink { 50% { opacity: 0 } }
  .caret { display: inline-block; background: #ff48a1; width: 8px; height: 14px; vertical-align: -2px; animation: cursor-blink 1s step-end infinite; }

  /* magenta wash on hover card */
  .card {
    background: #0a0912;
    border: 1px solid #22202b;
    transition: border-color 160ms var(--ease), transform 160ms var(--ease);
  }
  .card:hover { border-color: #ff2e88; }

  /* law card accent rule */
  .law-num {
    font-family: var(--font-mono); font-weight: 700; font-size: 11px;
    letter-spacing: 0.14em; color: #ff48a1;
  }

  /* terminal pane */
  .term {
    background: #000006; border: 1px solid #22202b;
    font-family: var(--font-mono); font-size: 12.5px; line-height: 1.65;
    color: #ebe7da;
  }
  .term .chrome {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; border-bottom: 1px solid #22202b;
    color: #6c6a5e; font-size: 11px; letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .term .chrome .dots { display: flex; gap: 5px; }
  .term .chrome .dots span { width: 9px; height: 9px; border-radius: 50%; background: #22202b; }

  /* line of flow */
  .flow-arrow { color: #ff48a1; font-family: var(--font-mono); }

  /* lifecycle rail */
  .rail {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 0;
    border: 1px solid #22202b;
  }
  .rail > div { padding: 22px 18px; border-right: 1px solid #22202b; position: relative; }
  .rail > div:last-child { border-right: 0; }
  .rail .idx { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; color: #6c6a5e; text-transform: uppercase; }
  .rail .name { font-family: var(--font-display); font-weight: 700; font-size: 18px; margin-top: 10px; letter-spacing: -0.01em; }
  .rail .sub { font-family: var(--font-mono); font-size: 11.5px; color: #a6a396; margin-top: 6px; line-height: 1.5; }
  .rail .tick { position: absolute; right: -6px; top: 50%; transform: translateY(-50%); color: #ff48a1; font-size: 14px; background: #05040a; padding: 0 2px; z-index: 2; }
  .rail > div:last-child .tick { display: none; }

  /* file tree */
  .tree { font-family: var(--font-mono); font-size: 12.5px; line-height: 1.75; color: #a6a396; }
  .tree .f { color: #ebe7da; }
  .tree .hi { color: #ff48a1; }
  .tree .d { color: #77a9ff; }
  .tree .c { color: #6c6a5e; }

  /* scanline subtle */
  .scan {
    position: absolute; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0,
      transparent 3px,
      rgba(255,46,136,0.012) 3px,
      rgba(255,46,136,0.012) 4px
    );
  }

  /* little receipt */
  .receipt {
    background: #11101a; border: 1px solid #22202b;
    font-family: var(--font-mono); font-size: 11.5px; color: #a6a396;
    padding: 10px 14px; line-height: 1.7;
  }
  .receipt .k { color: #6c6a5e; }
  .receipt .v { color: #ebe7da; }
  .receipt .ok { color: #3fe38d; }
  .receipt .warn { color: #ffc06b; }
  .receipt .mag { color: #ff48a1; }

  /* guide chat */
  .guide {
    background: #0a0912; border: 1px solid #22202b;
  }
  .guide .bubble-user { background: #11101a; border: 1px solid #22202b; }
  .guide .bubble-assistant { background: transparent; border-left: 2px solid #ff2e88; }

  /* section label */
  .section-tag {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.16em;
    text-transform: uppercase; color: #6c6a5e;
    padding-bottom: 4px; border-bottom: 1px solid #22202b;
  }
  .section-tag::before {
    content: ''; width: 6px; height: 6px; background: #ff2e88; display: inline-block;
  }

  /* responsive: assume desktop but keep flex */
  @media (max-width: 1100px) {
    .hero-grid { grid-template-columns: 1fr !important; }
    .rail { grid-template-columns: repeat(7, minmax(140px, 1fr)); overflow-x: auto; }
  }

  /* ============ MOBILE PASS (<=720px) ============ */
  @media (max-width: 720px) {
    html, body { overflow-x: hidden; }
    * { min-width: 0; }
    img, svg { max-width: 100%; height: auto; }

    .wrap { padding: 0 20px !important; max-width: 100% !important; }

    /* Section vertical rhythm */
    section { padding-top: 56px !important; padding-bottom: 56px !important; }

    /* Header — compress nav, hide secondary links, shrink CTA */
    header[style] { padding: 10px 16px !important; gap: 12px !important; height: 56px !important; }
    header nav { display: none !important; }
    .nav-cta { padding: 7px 10px 6px !important; font-size: 11px !important; box-shadow: 2px 2px 0 0 #ebe7da !important; }

/* Subtle quill motif — echoes the hero mascot language, used sparingly. */
function QuillRule({ count = 7, width = 260, color = '#ff2e88', opacity = 0.9 }) {
  // Evenly-spaced short verticals of varying length, like the mascot's quills laid flat.
  const lens = [10, 16, 22, 26, 22, 16, 10].slice(0, count);
  const step = width / (count + 1);
  return (
    <svg width={width} height="28" viewBox={`0 0 ${width} 28`} aria-hidden="true" style={{ display: 'block' }}>
      {lens.map((l, i) => (
        <line key={i}
          x1={step * (i + 1)} y1={26}
          x2={step * (i + 1)} y2={26 - l}
          stroke={color} strokeWidth="1.6" strokeLinecap="round" opacity={opacity}
        />
      ))}
    </svg>
  );
}
