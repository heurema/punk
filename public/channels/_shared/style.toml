schema_version = "1"

[identity]
project = "punk"
author = "Punk"

[audience]
primary = ["researchers", "developers", "experimenters", "AI builders"]
secondary = ["technical founders", "tooling engineers"]

[voice]
persona = "builder-researcher"
tone = ["clear", "pragmatic", "evidence-first", "calm", "honest"]
formality = 0.56
energy = 0.38
humor = 0.04

[policy]
ban_fluff = true
ban_em_dash = true
prefer_short_paragraphs = true
prefer_specific_dates = true
require_tradeoffs = true
require_concrete_claims = true
require_scope_honesty = true
require_active_vs_parked_distinction = true
forbid_production_ready_claims = true
forbid_hidden_automation_claims = true

[structure.story]
required_sections = ["hook", "context", "what_broke", "what_survived", "current_status", "cta"]

[structure.short_post]
required_sections = ["hook", "body", "cta"]
