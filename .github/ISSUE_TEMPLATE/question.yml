name: Question
description: Ask a bounded public question about current repo behavior or process
title: "[Question]: "
labels:
  - question
body:
  - type: markdown
    attributes:
      value: |
        For vulnerability details, do not use this form. See SECURITY.md.

  - type: input
    id: summary
    attributes:
      label: Question summary
      placeholder: Ask the question in one sentence
    validations:
      required: true

  - type: textarea
    id: trying
    attributes:
      label: What are you trying to do?
      placeholder: Describe the task or goal
    validations:
      required: true

  - type: textarea
    id: checked
    attributes:
      label: What have you already checked?
      placeholder: README.md, AGENTS.md, work/STATUS.md, docs/product/START-HERE.md, etc.
    validations:
      required: true

  - type: textarea
    id: blocker
    attributes:
      label: Where are you blocked?
      placeholder: Explain what is unclear or missing
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Commands, screenshots, environment, links, or examples
