name: Bug report
description: Report a bounded defect or inconsistency in punk
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report.

        Please keep it concrete and bounded. Include the exact file path, command, or work-ledger artifact when possible.

  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: A short one-line summary
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - work ledger / process tracking
        - docs / source-of-truth / governance
        - scripts / checks
        - core Rust crates
        - README / repo governance
        - brand / site / publishing
        - other
    validations:
      required: true

  - type: textarea
    id: current
    attributes:
      label: Current behavior
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Commands, steps, file paths, screenshots, or logs
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Branch, OS, shell, relevant files, screenshots, logs, etc.
