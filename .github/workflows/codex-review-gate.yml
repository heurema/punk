name: Codex Review Gate

on:
  pull_request_target:
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review
  pull_request_review:
    types:
      - submitted
      - edited
      - dismissed
  pull_request_review_comment:
    types:
      - created
      - edited
      - deleted

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  codex-review-gate:
    name: codex-review-gate
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check Codex review threads
        # pinned from heurema/repo-governance/actions/codex-review-gate@main
        uses: heurema/repo-governance/actions/codex-review-gate@a1f0c72edbbbe0513471b973e5afc799e7c51da1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          review-author-logins: chatgpt-codex-connector
          ignore-outdated: 'true'
          resolution-wait-seconds: '480'
